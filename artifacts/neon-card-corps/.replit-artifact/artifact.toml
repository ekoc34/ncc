kind = "mobile"
previewPath = "/"
title = "Neon Card Corps"
version = "1.0.0"
id = "artifacts/neon-card-corps"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22523

[services.development]
run = "pnpm --filter @workspace/neon-card-corps run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neon-card-corps", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/neon-card-corps", "run", "serve" ]

[services.env]
PORT = "22523"
BASE_PATH = "/"
